services:
  migrate:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8001:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  backend-worker:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "worker", "-Q", "default,low,medium,high,strategy", "--loglevel=WARNING"]
    environment:
      PYTHONPATH: /backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  backend-beat:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=WARNING"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  trader:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["python", "trader.py"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      backend-worker:
        condition: service_started

  trade-executer:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["python", "trade_executer.py"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  backend-flower:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "flower", "--port=5555"]
    ports:
      - "5556:5555"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend-worker

  postgres:
    build:
      context: .
      dockerfile: ./docker/postgres/Dockerfile
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_CONFIGS: "${TRADER_POSTGRES_DB}:${TRADER_POSTGRES_USER}:${TRADER_POSTGRES_PASSWORD}"
    volumes:
      - ./data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--loglevel", "notice"]
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8001/ws}
    ports:
      - "3001:3000"
    restart: unless-stopped
